<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hex Converter | Não Desista Dev</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    .tool-container {
      background: var(--bg-secondary);
      border: 2px solid var(--text-primary);
      border-radius: 10px;
      padding: 2rem;
      margin: 2rem 0;
    }

    .tool-header {
      border-bottom: 1px solid var(--text-secondary);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }

    .tool-title {
      font-size: 2rem;
      color: var(--text-primary);
    }

    .tool-area {
      background: #000;
      border-radius: 5px;
      padding: 2rem;
      margin: 2rem 0;
      border: 1px dashed var(--text-secondary);
    }

    textarea,
    input {
      background: #111;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 0.75rem;
      font-family: monospace;
      width: 100%;
      margin: 0.5rem 0;
      border-radius: 5px;
    }

    button {
      background: #0f0;
      color: #000;
      padding: 0.75rem 1.5rem;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 5px;
      margin: 0.5rem 0;
    }

    button:hover {
      opacity: 0.8;
    }

    .result-box {
      background: #111;
      padding: 1rem;
      border-radius: 5px;
      margin-top: 1rem;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <canvas class="matrix-bg" id="matrix"></canvas>
  <header class="terminal-header">
    <div class="terminal-title"><i class="fas fa-terminal"></i> tools / decoders / hex</div>
    <div class="terminal-status">
      <div class="status-item"><i class="fas fa-circle blink" style="color: #00ff00;"></i> ONLINE</div>
    </div>
  </header>

  <main class="container">
    <a href="../index.html" class="back-button"><i class="fas fa-arrow-left"></i> VOLTAR</a>

    <div class="tool-container">
      <div class="tool-header">
        <h1 class="tool-title">> HEX CONVERTER</h1>
      </div>

      <div class="tool-area">
        <h3>Texto → Hexadecimal</h3>
        <textarea id="textToHexInput" rows="3" placeholder="Digite o texto..."></textarea>
        <button onclick="textToHex()">CONVERTER</button>
        <div id="textToHexResult" class="result-box"></div>
      </div>

      <div class="tool-area">
        <h3>Hexadecimal → Texto</h3>
        <input type="text" id="hexToTextInput" placeholder="Ex: 48 65 78 61 (com ou sem espaços)">
        <button onclick="hexToText()">CONVERTER</button>
        <div id="hexToTextResult" class="result-box"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>NÃO DESISTA DEV - Ferramenta Hex</p>
  </footer>
  <script src="../../assets/js/script.js"></script>
  <script>
    function textToHex() {
      const input = document.getElementById('textToHexInput').value;
      let hex = '';
      for (let i = 0; i < input.length; i++) {
        hex += input.charCodeAt(i).toString(16).padStart(2, '0') + ' ';
      }
      document.getElementById('textToHexResult').innerHTML = hex.toUpperCase();
    }

    function hexToText() {
      const input = document.getElementById('hexToTextInput').value.replace(/\s/g, '');
      if (input.length % 2 !== 0) {
        document.getElementById('hexToTextResult').innerHTML = '<span style="color:#f00;">Erro: Tamanho inválido</span>';
        return;
      }
      let text = '';
      for (let i = 0; i < input.length; i += 2) {
        text += String.fromCharCode(parseInt(input.substr(i, 2), 16));
      }
      document.getElementById('hexToTextResult').innerHTML = text;
    }
  </script>
</body>

</html>
