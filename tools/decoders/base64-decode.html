<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 Decoder | Não Desista Dev</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    .tool-container {
      background: var(--bg-secondary);
      border: 2px solid var(--text-primary);
      border-radius: 10px;
      padding: 2rem;
      margin: 2rem 0;
    }

    .tool-header {
      border-bottom: 1px solid var(--text-secondary);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }

    .tool-title {
      font-size: 2rem;
      color: var(--text-primary);
    }

    .tool-area {
      background: #000;
      border-radius: 5px;
      padding: 2rem;
      margin: 2rem 0;
      border: 1px dashed var(--text-secondary);
    }

    textarea,
    input {
      background: #111;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 0.75rem;
      font-family: monospace;
      width: 100%;
      margin: 0.5rem 0;
      border-radius: 5px;
    }

    button {
      background: #0f0;
      color: #000;
      padding: 0.75rem 1.5rem;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 5px;
      margin: 0.5rem 0;
    }

    button:hover {
      opacity: 0.8;
    }

    .result-box {
      background: #111;
      padding: 1rem;
      border-radius: 5px;
      margin-top: 1rem;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <canvas class="matrix-bg" id="matrix"></canvas>
  <header class="terminal-header">
    <div class="terminal-title"><i class="fas fa-terminal"></i> tools / decoders / base64</div>
    <div class="terminal-status">
      <div class="status-item"><i class="fas fa-circle blink" style="color: #00ff00;"></i> ONLINE</div>
    </div>
  </header>

  <main class="container">
    <a href="../index.html" class="back-button"><i class="fas fa-arrow-left"></i> VOLTAR</a>

    <div class="tool-container">
      <div class="tool-header">
        <h1 class="tool-title">> BASE64 DECODER</h1>
      </div>

      <div class="tool-area">
        <h3>Codificar para Base64</h3>
        <textarea id="encodeInput" rows="4" placeholder="Digite o texto para codificar..."></textarea>
        <button onclick="encodeBase64()">CODIFICAR</button>
        <div id="encodeResult" class="result-box"></div>
      </div>

      <div class="tool-area">
        <h3>Decodificar Base64</h3>
        <textarea id="decodeInput" rows="4" placeholder="Cole a string Base64..."></textarea>
        <button onclick="decodeBase64()">DECODIFICAR</button>
        <div id="decodeResult" class="result-box"></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>NÃO DESISTA DEV - Ferramenta Base64</p>
  </footer>
  <script src="../../assets/js/script.js"></script>
  <script>
    function encodeBase64() {
      const input = document.getElementById('encodeInput').value;
      try {
        document.getElementById('encodeResult').innerHTML = btoa(input);
      } catch {
        document.getElementById('encodeResult').innerHTML = '<span style="color:#f00;">Erro ao codificar</span>';
      }
    }

    function decodeBase64() {
      const input = document.getElementById('decodeInput').value;
      try {
        document.getElementById('decodeResult').innerHTML = atob(input);
      } catch {
        document.getElementById('decodeResult').innerHTML = '<span style="color:#f00;">Erro ao decodificar</span>';
      }
    }
  </script>
</body>

</html>
