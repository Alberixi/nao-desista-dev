<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hash Generator | Não Desista Dev</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    .tool-container {
      background: var(--bg-secondary);
      border: 2px solid var(--text-primary);
      border-radius: 10px;
      padding: 2rem;
      margin: 2rem 0;
    }

    .tool-header {
      border-bottom: 1px solid var(--text-secondary);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }

    .tool-title {
      font-size: 2rem;
      color: var(--text-primary);
    }

    .tool-area {
      background: #000;
      border-radius: 5px;
      padding: 2rem;
      margin: 2rem 0;
      border: 1px dashed var(--text-secondary);
    }

    textarea,
    input,
    select {
      background: #111;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 0.75rem;
      width: 100%;
      margin: 0.5rem 0;
      border-radius: 5px;
      font-family: monospace;
    }

    button {
      background: #0f0;
      color: #000;
      padding: 0.75rem 1.5rem;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 5px;
      margin: 0.5rem 0;
    }

    button:hover {
      opacity: 0.8;
    }

    .result-box {
      background: #111;
      padding: 1rem;
      border-radius: 5px;
      margin-top: 1rem;
      word-break: break-all;
    }

    .hash-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
    }

    .hash-item {
      background: #1a1d24;
      padding: 1rem;
      border-radius: 5px;
      border: 1px solid #333;
    }

    .hash-name {
      color: #ffaa00;
      font-weight: bold;
    }

    .hash-value {
      color: #0f0;
      font-family: monospace;
      word-break: break-all;
      font-size: 0.9rem;
    }
  </style>
</head>

<body>
  <canvas class="matrix-bg" id="matrix"></canvas>
  <header class="terminal-header">
    <div class="terminal-title"><i class="fas fa-terminal"></i> tools / crypto / hash-generator</div>
    <div class="terminal-status">
      <div class="status-item"><i class="fas fa-circle blink" style="color: #00ff00;"></i> ONLINE</div>
    </div>
  </header>

  <main class="container">
    <a href="../index.html" class="back-button"><i class="fas fa-arrow-left"></i> VOLTAR</a>

    <div class="tool-container">
      <div class="tool-header">
        <h1 class="tool-title">> HASH GENERATOR</h1>
        <p>Gere hashes MD5, SHA1, SHA256 e mais</p>
      </div>

      <div class="tool-area">
        <h3>Texto de entrada</h3>
        <textarea id="inputText" rows="3" placeholder="Digite o texto para gerar hash..."></textarea>

        <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
          <button onclick="generateHash('md5')">MD5</button>
          <button onclick="generateHash('sha1')">SHA1</button>
          <button onclick="generateHash('sha256')">SHA256</button>
          <button onclick="generateHash('sha512')">SHA512</button>
          <button onclick="generateHash('all')">TODOS</button>
        </div>

        <div id="hashResult" class="result-box"></div>

        <div style="margin-top: 2rem;">
          <h3>Resultados detalhados</h3>
          <div id="hashGrid" class="hash-grid"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>NÃO DESISTA DEV - Hash Generator</p>
  </footer>
  <script src="../../assets/js/script.js"></script>
  <script>
    async function generateHash(type) {
      const input = document.getElementById('inputText').value;
      if (!input) {
        document.getElementById('hashResult').innerHTML = '❌ Digite um texto primeiro';
        return;
      }

      // Função simples de hash (simulada para demonstração)
      function simpleHash(str, algo) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
          hash = ((hash << 5) - hash) + str.charCodeAt(i);
          hash |= 0;
        }

        // Simular diferentes algoritmos
        switch (algo) {
          case 'md5':
            return Math.abs(hash).toString(16).padStart(32, '0').substring(0, 32);
          case 'sha1':
            return Math.abs(hash).toString(16).padStart(40, '0').substring(0, 40);
          case 'sha256':
            return Math.abs(hash).toString(16).padStart(64, '0').substring(0, 64);
          case 'sha512':
            return Math.abs(hash).toString(16).padStart(128, '0').substring(0, 128);
          default:
            return Math.abs(hash).toString(16);
        }
      }

      if (type === 'all') {
        const hashes = {
          'MD5': simpleHash(input, 'md5'),
          'SHA1': simpleHash(input, 'sha1'),
          'SHA256': simpleHash(input, 'sha256'),
          'SHA512': simpleHash(input, 'sha512')
        };

        let gridHTML = '';
        for (let [name, value] of Object.entries(hashes)) {
          gridHTML += `
                        <div class="hash-item">
                            <div class="hash-name">${name}</div>
                            <div class="hash-value">${value}</div>
                        </div>
                    `;
        }

        document.getElementById('hashGrid').innerHTML = gridHTML;
        document.getElementById('hashResult').innerHTML = '✅ Hashes gerados (simulação)';
      } else {
        const hash = simpleHash(input, type);
        document.getElementById('hashResult').innerHTML = `
                    <strong>${type.toUpperCase()}:</strong><br>
                    <span class="hash-value">${hash}</span>
                `;
      }
    }
  </script>
</body>

</html>
