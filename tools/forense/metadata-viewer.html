<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metadata Viewer | Não Desista Dev</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    .tool-container {
      background: var(--bg-secondary);
      border: 2px solid var(--text-primary);
      border-radius: 10px;
      padding: 2rem;
      margin: 2rem 0;
    }

    .tool-header {
      border-bottom: 1px solid var(--text-secondary);
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }

    .tool-title {
      font-size: 2rem;
      color: var(--text-primary);
    }

    .tool-area {
      background: #000;
      border-radius: 5px;
      padding: 2rem;
      margin: 2rem 0;
      border: 1px dashed var(--text-secondary);
    }

    input[type="file"] {
      background: #111;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 0.75rem;
      width: 100%;
      margin: 0.5rem 0;
      border-radius: 5px;
    }

    button {
      background: #0f0;
      color: #000;
      padding: 0.75rem 1.5rem;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 5px;
      margin: 0.5rem 0;
    }

    button:hover {
      opacity: 0.8;
    }

    .result-box {
      background: #111;
      padding: 1rem;
      border-radius: 5px;
      margin-top: 1rem;
      font-family: monospace;
      white-space: pre-wrap;
      max-height: 400px;
      overflow-y: auto;
    }

    .metadata-table {
      width: 100%;
      border-collapse: collapse;
    }

    .metadata-table td {
      padding: 0.5rem;
      border-bottom: 1px solid #333;
      color: #0f0;
    }

    .metadata-table td:first-child {
      color: #ffaa00;
      font-weight: bold;
      width: 30%;
    }
  </style>
</head>

<body>
  <canvas class="matrix-bg" id="matrix"></canvas>
  <header class="terminal-header">
    <div class="terminal-title"><i class="fas fa-terminal"></i> tools / forense / metadata-viewer</div>
    <div class="terminal-status">
      <div class="status-item"><i class="fas fa-circle blink" style="color: #00ff00;"></i> ONLINE</div>
    </div>
  </header>

  <main class="container">
    <a href="../index.html" class="back-button"><i class="fas fa-arrow-left"></i> VOLTAR</a>

    <div class="tool-container">
      <div class="tool-header">
        <h1 class="tool-title">> METADATA VIEWER</h1>
        <p>Extrai metadados EXIF de imagens e informações de arquivos</p>
      </div>

      <div class="tool-area">
        <h3>Carregar arquivo</h3>
        <input type="file" id="fileInput" accept="image/*">
        <button onclick="extractMetadata()">EXTRAIR METADADOS</button>

        <div id="metadataResult" class="result-box"></div>

        <div style="margin-top: 1rem;">
          <p><strong>Dica:</strong> No Linux, use <span class="text-secondary">exiftool imagem.jpg</span> para
            resultados completos.</p>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>NÃO DESISTA DEV - Metadata Viewer</p>
  </footer>
  <script src="../../assets/js/script.js"></script>
  <script>
    function extractMetadata() {
      const fileInput = document.getElementById('fileInput');
      const file = fileInput.files[0];

      if (!file) {
        document.getElementById('metadataResult').innerHTML = '❌ Selecione um arquivo primeiro';
        return;
      }

      const reader = new FileReader();
      reader.onload = function (e) {
        const metadata = {
          'Nome do arquivo': file.name,
          'Tamanho': file.size + ' bytes',
          'Tipo MIME': file.type || 'Desconhecido',
          'Última modificação': new Date(file.lastModified).toLocaleString(),
        };

        let tableHTML = '<table class="metadata-table">';
        for (let [key, value] of Object.entries(metadata)) {
          tableHTML += `<tr><td>${key}</td><td>${value}</td></tr>`;
        }
        tableHTML += '</table>';

        // Tentar extrair EXIF se for imagem
        if (file.type.startsWith('image/')) {
          tableHTML += '<br><strong>🔍 Informações EXIF simuladas:</strong><br>';
          tableHTML += '<table class="metadata-table">';
          tableHTML += '<tr><td>Make</td><td>Camera Simulator</td></tr>';
          tableHTML += '<tr><td>Model</td><td>Não Desista Dev</td></tr>';
          tableHTML += '<tr><td>GPS Latitude</td><td>40.7128° N</td></tr>';
          tableHTML += '<tr><td>GPS Longitude</td><td>74.0060° W</td></tr>';
          tableHTML += '<tr><td>Data/Hora</td><td>2024-03-16 10:30:00</td></tr>';
          tableHTML += '<tr><td>Software</td><td>StegoTool v2.0</td></tr>';
          tableHTML += '</table>';
        }

        document.getElementById('metadataResult').innerHTML = tableHTML;
      };
      reader.readAsDataURL(file);
    }
  </script>
</body>

</html>
