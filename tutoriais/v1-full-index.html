<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Não Desista Dev - Portal de Tutoriais</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.2s ease, border-color 0.2s ease;
        }

        /* Temas (variáveis) */
        :root {
            /* Modo Claro (padrão) */
            --bg-body: #f5f7fb;
            --bg-header: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #f97316; /* laranja */
            --accent-hover: #ea580c;
            --btn-toggle-bg: #f1f5f9;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
            --header-shadow: 0 1px 2px rgba(0, 0, 0, 0.03), 0 1px 3px rgba(0, 0, 0, 0.05);
        }

        body.dark {
            --bg-body: #0f172a;
            --bg-header: #1e293b;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border: #334155;
            --accent: #38bdf8; /* azul claro */
            --accent-hover: #0ea5e9;
            --btn-toggle-bg: #334155;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --header-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.5;
        }

        /* Container principal */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* Header */
        .site-header {
            background-color: var(--bg-header);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: var(--header-shadow);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo-area h1 {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .logo-area p {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* Botão toggle tema */
        .theme-toggle {
            background: var(--btn-toggle-bg);
            border: 1px solid var(--border);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            transition: all 0.2s;
        }
        .theme-toggle:hover {
            opacity: 0.9;
            transform: scale(0.97);
        }

        /* Grid de cards */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.8rem;
            margin-top: 2rem;
        }

        /* Card individual */
        .card {
            background-color: var(--bg-card);
            border-radius: 1rem;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -12px rgba(0, 0, 0, 0.2);
        }

        .card-header {
            padding: 1rem 1.2rem 0.5rem 1.2rem;
            border-bottom: 1px solid var(--border);
        }
        .card-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.25rem;
        }
        .card-sub {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .card-content {
            padding: 1.2rem;
        }
        .card-content p {
            margin-bottom: 0.75rem;
            color: var(--text-secondary);
        }
        .card-content code {
            background: var(--bg-body);
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.85rem;
            border: 1px solid var(--border);
            color: var(--accent);
        }
        .card-footer {
            padding: 0.8rem 1.2rem 1.2rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
        }
        .tag {
            background: var(--accent);
            color: white;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-block;
        }
        .btn-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-link:hover {
            text-decoration: underline;
        }
        hr {
            border-color: var(--border);
            margin: 0.5rem 0;
        }

        /* rodapé */
        .footer {
            margin-top: 3rem;
            text-align: center;
            padding: 2rem 0;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* simular "oldest posts" */
        .oldest-badge {
            text-align: right;
            margin-top: 1rem;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        @media (max-width: 680px) {
            .header-content {
                flex-direction: column;
                text-align: center;
            }
            .cards-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container header-content">
            <div class="logo-area">
                <h1>🚀 não desista.dev</h1>
                <p>tutoriais • dev community • código real</p>
            </div>
            <button class="theme-toggle" id="themeToggleBtn" aria-label="Alternar tema">
                🌙 Modo Escuro
            </button>
        </div>
    </header>

    <main class="container">
        <div class="cards-grid" id="cardsContainer">
            <!-- Os cards serão gerados via JavaScript, mas também podem ser estáticos, porém centralizamos -->
        </div>
        <div class="oldest-badge">
            📌 Posts mais antigos • conteúdo curado para a comunidade
        </div>
    </main>

    <footer class="footer">
        <p>✨ Projeto colaborativo para <strong>Não Desista Dev</strong> — aprendizado e evolução contínua. ✨</p>
        <p style="margin-top: 0.5rem;">HTML/CSS/JS puro | Dark/Light mode | Código aberto no GitHub</p>
    </footer>

    <script>
        // Dados dos cards: substituindo os blocos da imagem por tutoriais/informações técnicas
        const cardsData = [
            {
                title: "🚀 CSS Grid: Layouts Modernos",
                sub: "Tutorial • 10 min leitura",
                content: "Aprenda a criar interfaces responsivas sem sofrência. Domine grid-template-areas, auto-fit e gaps dinâmicos. Ideal para portfólios e dashboards.",
                codeSnippet: "display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));",
                tag: "CSS ESSENCIAL",
                link: "#"
            },
            {
                title: "💡 JavaScript Assíncrono na Prática",
                sub: "Dica avançada • 8 min",
                content: "Entenda promises, async/await e como lidar com múltiplas requisições sem callback hell. Exemplo com fetch API e tratamento de erros.",
                codeSnippet: "const data = await fetch(url).then(res => res.json());",
                tag: "JS MODERNO",
                link: "#"
            },
            {
                title: "🎨 Dark Mode com Variáveis CSS",
                sub: "Projeto prático",
                content: "Implemente tema claro/escuro de forma nativa, sem frameworks. Usamos :root, prefer-color-scheme e um botão para alternar.",
                codeSnippet: ":root { --bg: #fff; } body.dark { --bg: #000; }",
                tag: "UI/UX",
                link: "#"
            },
            {
                title: "⚛️ React Hooks: useMemo e useCallback",
                sub: "Performance • 12 min",
                content: "Evite renderizações desnecessárias e otimize seus componentes funcionais. Dicas de boas práticas para aplicações escaláveis.",
                codeSnippet: "const memoValue = useMemo(() => compute(), [dep]);",
                tag: "REACT",
                link: "#"
            },
            {
                title: "🐍 Python: Automação com Scripts",
                sub: "Ferramentas dev",
                content: "Crie bots para tarefas repetitivas, organizar arquivos ou enviar emails. Use bibliotecas como os, shutil e schedule.",
                codeSnippet: "import os; os.rename('old.txt', 'new.txt')",
                tag: "PYTHON",
                link: "#"
            },
            {
                title: "📱 Git Workflow para Equipes",
                sub: "Colaboração",
                content: "Evite conflitos no repositório: Git Flow, commits semânticos, pull requests e boas práticas de mensagens de commit.",
                codeSnippet: "git commit -m 'feat: add dark mode toggle'",
                tag: "DEVOPS",
                link: "#"
            },
            {
                title: "🧠 Estrutura de Dados: Linked List",
                sub: "Algoritmos • 15 min",
                content: "Entenda listas encadeadas em JS/TS. Implemente métodos de inserção, remoção e busca. Base para entrevistas técnicas.",
                codeSnippet: "class Node { constructor(val) { this.val = val; this.next = null; } }",
                tag: "ALGORITMOS",
                link: "#"
            },
            {
                title: "📦 Vite vs Webpack: Qual usar?",
                sub: "Build tools",
                content: "Comparativo de desempenho, configuração e tempo de hot reload. Vantagens do Vite para projetos modernos.",
                codeSnippet: "npm create vite@latest my-app -- --template react",
                tag: "FERRAMENTAS",
                link: "#"
            },
            {
                title: "♿ Acessibilidade na Web (WCAG)",
                sub: "Inclusão",
                content: "Melhore semântica, contraste, navegação por teclado e leitores de tela. Pequenas mudanças que fazem diferença.",
                codeSnippet: "<button aria-label='Fechar menu'>✖</button>",
                tag: "BEST PRACTICES",
                link: "#"
            }
        ];

        // Função para renderizar os cards dinamicamente
        function renderCards() {
            const container = document.getElementById('cardsContainer');
            if (!container) return;
            
            container.innerHTML = '';
            cardsData.forEach(card => {
                const cardEl = document.createElement('article');
                cardEl.className = 'card';
                cardEl.innerHTML = `
                    <div class="card-header">
                        <div class="card-title">${card.title}</div>
                        <div class="card-sub">${card.sub}</div>
                    </div>
                    <div class="card-content">
                        <p>${card.content}</p>
                        <p><code>💻 ${card.codeSnippet}</code></p>
                    </div>
                    <div class="card-footer">
                        <span class="tag">${card.tag}</span>
                        <div style="margin-top: 0.6rem;">
                            <a href="${card.link}" class="btn-link">Acessar tutorial →</a>
                        </div>
                    </div>
                `;
                container.appendChild(cardEl);
            });
        }

        // Gerenciar Tema (Dark/Light)
        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.body.classList.add('dark');
                updateToggleButtonText(true);
            } else {
                document.body.classList.remove('dark');
                updateToggleButtonText(false);
            }
        }
        
        function updateToggleButtonText(isDark) {
            const btn = document.getElementById('themeToggleBtn');
            if (btn) {
                if (isDark) {
                    btn.innerHTML = '☀️ Modo Claro';
                } else {
                    btn.innerHTML = '🌙 Modo Escuro';
                }
            }
        }
        
        function toggleTheme() {
            const isDark = document.body.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateToggleButtonText(isDark);
        }
        
        // Ajuste adicional: a cor do acento muda dinamicamente (laranja no claro, azul no escuro)
        // Isso já está garantido pelas variáveis CSS definidas com o seletor body.dark e :root
        // Também adicionamos um pequeno helper para dar ênfase
        
        // Bônus: modificar metadados do header se necessário
        
        // Inicialização quando o DOM estiver pronto
        document.addEventListener('DOMContentLoaded', () => {
            renderCards();
            initTheme();
            const themeBtn = document.getElementById('themeToggleBtn');
            if (themeBtn) {
                themeBtn.addEventListener('click', toggleTheme);
            }
        });
    </script>
</body>
</html>
