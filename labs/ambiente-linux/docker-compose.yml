version: '3.8'

services:
  # Laboratório principal de forense
  forensics-lab:
    build: .
    container_name: forensics-linux
    hostname: forensics-lab
    ports:
      - "2222:22"      # SSH
      - "8080:80"      # Web server
      - "4444:4444"    # Netcat listener
    volumes:
      - ./scripts:/scripts:ro
      - ../../assets:/assets:ro
      - lab-data:/cases
    stdin_open: true
    tty: true
    privileged: true
    networks:
      - lab-network
    restart: unless-stopped

  # Servidor web vulnerável
  vulnerable-web:
    image: vulnerables/web-dvwa
    container_name: dvwa-lab
    ports:
      - "8081:80"
    networks:
      - lab-network
    restart: unless-stopped

  # Servidor FTP vulnerável
  vulnerable-ftp:
    image: stilliard/pure-ftpd:hardened
    container_name: ftp-lab
    ports:
      - "21:21"
      - "30000-30009:30000-30009"
    environment:
      - PUBLICHOST=localhost
      - FTP_USER=hacker
      - FTP_PASSWORD=hacker123
    networks:
      - lab-network
    restart: unless-stopped

  # Servidor SMB vulnerável
  vulnerable-smb:
    image: dperson/samba
    container_name: smb-lab
    ports:
      - "139:139"
      - "445:445"
    command: '-u "hacker;hacker123" -s "public;/share;yes;no;yes;all"'
    volumes:
      - smb-share:/share
    networks:
      - lab-network
    restart: unless-stopped

  # Elastic Stack para análise de logs
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - lab-network
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - lab-network
    depends_on:
      - elasticsearch
    restart: unless-stopped

  # Wazuh SIEM
  wazuh:
    image: wazuh/wazuh
    container_name: wazuh
    ports:
      - "55000:55000"
      - "1514:1514"
      - "1515:1515"
    networks:
      - lab-network
    restart: unless-stopped

networks:
  lab-network:
    driver: bridge

volumes:
  lab-data:
  smb-share:
